    <!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <title>Clothing Menu - Coast Side Dev</title>
</head>
<body>
    <!-- Clothing Menu Container -->
    <div class="clothing-menu" id="clothingMenu">
        <!-- Sidebar Container -->
        <div class="sidebar">
            <!-- HEAD Section -->
            <div class="category-section">
                <div class="category-label">HEAD</div>
                <div class="icon-grid">
                    <div class="icon-box" data-item="Hat" title="Hat">
                        <i class="fas fa-hat-cowboy"></i>
                    </div>
                    <div class="icon-box" data-item="Hair" title="Hair">
                        <i class="fas fa-scissors"></i>
                    </div>
                    <div class="icon-box" data-item="Glasses" title="Glasses">
                        <i class="fas fa-glasses"></i>
                    </div>
                    <div class="icon-box" data-item="Mask" title="Mask">
                        <i class="fas fa-mask"></i>
                    </div>
                    <div class="icon-box" data-item="Earrings" title="Earrings">
                        <i class="fas fa-gem"></i>
                    </div>
                </div>
            </div>

            <!-- BODY Section -->
            <div class="category-section">
                <div class="category-label">BODY</div>
                <div class="icon-grid">
                    <div class="icon-box" data-item="Top" title="Jacket">
                        <i class="fas fa-vest"></i>
                    </div>
                    <div class="icon-box" data-item="Shirt" title="Shirt">
                        <i class="fas fa-shirt"></i>
                    </div>
                    <div class="icon-box" data-item="Vest" title="Vest">
                        <i class="fas fa-vest"></i>
                    </div>
                    <div class="icon-box" data-item="Pants" title="Pants">
                        <i class="fas fa-person"></i>
                    </div>
                    <div class="icon-box" data-item="Shoes" title="Shoes">
                        <i class="fas fa-shoe-prints"></i>
                    </div>
                </div>
            </div>

            <!-- ACCESSORIES Section -->
            <div class="category-section">
                <div class="category-label">ACCESSORIES</div>
                <div class="icon-grid">
                    <div class="icon-box" data-item="Neck" title="Necklace">
                        <i class="fas fa-circle-notch"></i>
                    </div>
                    <div class="icon-box" data-item="Watch" title="Watch">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="icon-box" data-item="Gloves" title="Gloves">
                        <i class="fas fa-mitten"></i>
                    </div>
                    <div class="icon-box" data-item="Bag" title="Bag">
                        <i class="fas fa-bag-shopping"></i>
                    </div>
                </div>
            </div>

            <!-- Close Button -->
            <div class="close-button" id="closeButton">
                <i class="fas fa-times"></i>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="js/ui.js"></script>
</body>
</html>
